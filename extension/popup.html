<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 18px;
      color: #c4a35a;
      text-align: center;
      margin-bottom: 12px;
    }
    .tool-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
    }
    .tool-btn:hover {
      background: #16213e;
      border-color: #c4a35a;
    }
    .tool-btn .desc {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h1>Utopia Smart Tools</h1>
  <button class="tool-btn" id="openEowcf">
    Home Data Simulation
    <div class="desc">View calculated formulas and export debug JSON</div>
  </button>
  <button class="tool-btn" id="openSimulator">
    Tick Simulator
    <div class="desc">Simulate economy &amp; draft over multiple ticks</div>
  </button>
  <button class="tool-btn" id="openPumping">
    CF Pumping Planner
    <div class="desc">Retroplan armouries → draft → train for CF exit</div>
  </button>
  <script src="popup.js"></script>
</body>
</html>
