<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scraper Spell Tests</title>
  <style>
    body { font-family: 'Consolas', 'Monaco', monospace; margin: 20px; background: #1a1a2e; color: #e0e0e0; }
    h1 { color: #e94560; }
    h2 { color: #0f3460; background: #e94560; padding: 6px 12px; display: inline-block; margin-top: 24px; }
    .summary { font-size: 1.3em; margin: 16px 0; padding: 12px; border-radius: 6px; }
    .summary.pass { background: #0a3d0a; border: 2px solid #2ecc71; }
    .summary.fail { background: #3d0a0a; border: 2px solid #e74c3c; }
    .test { padding: 3px 8px; margin: 1px 0; font-size: 0.9em; }
    .test.pass { color: #2ecc71; }
    .test.fail { color: #e74c3c; font-weight: bold; }
    .section { margin: 12px 0 4px; color: #16a085; font-weight: bold; font-size: 1.05em; }
    .error { color: #f39c12; font-style: italic; padding: 3px 8px; }
  </style>
</head>
<body>
  <h1>Scraper Spell Tests — Real Production HTML</h1>
  <div id="summary"></div>
  <div id="results"></div>

  <script src="../data/game_data.js"></script>
  <script src="../data/spells.js"></script>
  <script src="../core/utils.js"></script>
  <script src="../core/engine.js"></script>
  <script src="../scraper/scrapers.js"></script>
  <script src="scraper_spells.js"></script>
</body>
</html>
